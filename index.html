<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Astros wallpaper</title>

  <style>
    body {
      background: black;
      color: #00aaff;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid #333;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      border-color: #00aaff;
    }
  </style>
</head>

<body>

  <h1>Astros wallpaper</h1>

  <div class="gallery" id="gallery"></div>

  <script>
    const gallery = document.getElementById("gallery");

    // يقرأ الصور من 1 إلى 70
    for (let i = 1; i <= 70; i++) {
      let img = document.createElement("img");
      img.src = "images/" + i + ".jpg";
      img.alt = "img " + i;

      // إذا الصورة ما لقاها يخفيها
      img.onerror = function () {
        this.style.display = "none";
      };

      gallery.appendChild(img);
    }
  </script>

</body>
</html>
